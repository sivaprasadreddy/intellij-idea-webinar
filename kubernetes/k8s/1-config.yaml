apiVersion: v1
kind: ConfigMap
metadata:
  name: bookstore-configmap
  namespace: default
data:
  postgres_host: "bookstore-postgres-svc"
  postgres_port: "5432"
  postgres_database: "postgres"
  redis_host: "bookstore-redis-svc"
  redis_port: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: bookstore-secrets
type: Opaque
data:
  postgres_username: cG9zdGdyZXM= # postgres
  postgres_password: cG9zdGdyZXM= # postgres
